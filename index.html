<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, height=device-height">
    <title>詞海拾心 · 音速行旅</title>

    <!-- CSP 與原有配置相同 -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://www.gstatic.com https://*.firebaseio.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' https: data:;
        media-src 'self';
        connect-src 'self' https://*.firebaseio.com wss://*.firebaseio.com https://www.gstatic.com;
        object-src 'none';
        base-uri 'self';
        form-action 'none';
    ">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 所有原始樣式完全保留，僅修正 appearance 兼容性並新增流速數值樣式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f4f8; font-family: 'Noto Serif TC', serif; touch-action: manipulation; color: #333; min-height: 100vh; overflow-x: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        body::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 10% 20%, rgba(255,200,124,0.1) 0%, transparent 20%), radial-gradient(circle at 90% 80%, rgba(108,99,255,0.1) 0%, transparent 20%); z-index: -1; }
        .background-image { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('背景.png'); background-size: cover; background-position: center; opacity: 0.6; z-index: -2; }
        .container { max-width: 1200px; margin: 0 auto; padding: 10px; position: relative; z-index: 1; }
        .main-game-container { border: 2px solid rgba(0,0,0,0.1); border-radius: 15px; padding: 15px; background: rgba(255,255,255,0.3); box-shadow: 0 0 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        header { text-align: center; padding: 10px 0; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; background: linear-gradient(45deg, #ff8a00, #e52e71); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .subtitle { font-size: 1rem; opacity: 0.8; }
        .game-ui { position: relative; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; padding-bottom: 75px; backdrop-filter: blur(10px); }
        .stats { display: flex; gap: 20px; }
        .stat-box { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 8px 12px; min-width: 90px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #ffcc00; }
        .stat-label { font-size: 1rem; color: #fff; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        .controls { display: flex; gap: 8px; align-items: center; }
        .svg-button { background: none; border: none; cursor: pointer; width: 80px; height: 40px; transition: transform 0.3s ease; }
        .music-selector { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .music-select-wrapper select { background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 35px 8px 12px; border-radius: 50px; font-size: 0.9rem; max-width: 120px; appearance: none; -webkit-appearance: none; cursor: pointer; }
        .difficulty-selector select { background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 5px; max-width: 110px; appearance: none; -webkit-appearance: none; }
        .progress-container, .opponent-progress-container, .unlock-progress-container { position: absolute; left: 10px; right: 10px; height: 12px; border-radius: 6px; overflow: hidden; opacity: 0; transform: translateY(100%); transition: opacity 0.5s ease, transform 0.5s ease; }
        .progress-container { bottom: 10px; background: rgba(255,255,255,0.1); }
        .opponent-progress-container { bottom: 27px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); }
        .unlock-progress-container { bottom: 44px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; }
        .game-running .progress-container, .game-running .unlock-progress-container { opacity: 1; transform: translateY(0); }
        .game-running.online-mode .opponent-progress-container { opacity: 1; transform: translateY(0); }
        .unlock-progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #1D976C, #93F9B9); transition: width 0.2s ease-out; }
        .progress-bar { background: linear-gradient(90deg, #ffeb3b, #ffc107); width: 0%; transition: width 0.1s linear; }
        .opponent-progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #e52e71, #ff8a00); transition: width 0.2s ease-out; border-radius: 6px; }
        .tracks { display: flex; justify-content: center; gap: 8px; position: relative; height: 600px; background: rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; padding: 15px 0; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .track { width: 80px; height: 100%; background: rgba(0,0,0,0.1); border-radius: 8px; position: relative; }
        .hit-line { position: absolute; bottom: 100px; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #ff8a00, #e52e71); border-radius: 2px; z-index: 10; }
        .note, .long-note { position: absolute; width: 70px; border-radius: 12px; left: 5px; animation: fall linear; z-index: 5; }
        .note { height: 25px; background: linear-gradient(45deg, #00c9ff, #92fe9d); }
        .long-note { background: linear-gradient(45deg, #ff416c, #ff4b2b); }
        @keyframes fall { from { transform: translateY(-50px); } to { transform: translateY(650px); } }
        .judgment { position: absolute; bottom: 150px; width: 100%; text-align: center; font-size: 1.5rem; font-weight: bold; opacity: 0; z-index: 20; animation: judgmentFade 1s ease-out; }
        .combo-display { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: bold; opacity: 0; z-index: 15; animation: comboFlash 0.5s ease-out; pointer-events: none; }
        .touch-controls { display: none; justify-content: center; gap: 15px; margin-top: 15px; padding: 10px 0; }
        .touch-key { width: 70px; height: 70px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; backdrop-filter: blur(10px); border: 2px solid; transition: box-shadow 0.15s ease, transform 0.1s ease; cursor: pointer; }
        .touch-key[data-key="65"] { background: linear-gradient(135deg, rgba(0,220,220,0.7), rgba(0,100,120,0.8)); border-color: rgba(80,230,230,0.8); }
        .touch-key[data-key="83"] { background: linear-gradient(135deg, rgba(0,201,255,0.7), rgba(0,123,255,0.75)); border-color: rgba(100,220,255,0.8); }
        .touch-key[data-key="68"] { background: linear-gradient(135deg, rgba(210,240,255,0.7), rgba(150,210,255,0.8)); border-color: rgba(220,245,255,0.85); }
        .touch-key[data-key="70"] { background: linear-gradient(135deg, rgba(225,230,235,0.7), rgba(170,180,190,0.8)); border-color: rgba(230,235,240,0.8); }
        .settings-modal, .game-over-modal, .personal-high-score-modal, .music-player-modal, .unlock-modal, .notification-modal, .lyrics-quiz-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .settings-modal.active, .game-over-modal.active, .personal-high-score-modal.active, .music-player-modal.active, .unlock-modal.active, .notification-modal.active, .lyrics-quiz-modal.active { opacity: 1; pointer-events: all; }
        .settings-content, .game-over-content, .personal-high-score-content, .music-player-content, .unlock-content, .notification-content, .quiz-content { background: linear-gradient(145deg, #fdfbfb, #ebedee); border-radius: 20px; width: 90%; max-width: 500px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); transform: scale(0.95); transition: transform 0.3s ease, opacity 0.3s ease; }
        .active .settings-content, .active .game-over-content, .active .personal-high-score-content, .active .music-player-content, .active .unlock-content, .active .notification-content, .active .quiz-content { transform: scale(1); }
        .restart-btn { background: linear-gradient(45deg, #a3e635, #68d391); color: #fff; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        .setting-slider { width: 100%; height: 8px; -webkit-appearance: none; appearance: none; background: #4a5568; border-radius: 5px; }
        .setting-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; background: #e2e8f0; border-radius: 50%; cursor: pointer; }
        .cd-cover-wrapper { max-width: 220px; margin: 0 auto 20px; border-radius: 50%; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .cd-cover-img { width: 100%; border-radius: 50%; transition: transform 0.5s; }
        .cd-cover-img.playing { animation: cdSpin 15s linear infinite; }
        @keyframes cdSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .playlist { max-height: 200px; overflow-y: auto; margin-top: 20px; }
        .playlist-item { padding: 10px; cursor: pointer; border-radius: 8px; transition: background 0.2s; }
        .playlist-item.active { background: rgba(255,107,107,0.8); color: white; }
        #noteSpeedValue { margin-left: 10px; font-weight: bold; color: #ffcc00; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 20px; display: inline-block; }
        @media (max-width: 768px) { .tracks { height: 500px; } .track { width: 60px; } .note, .long-note { width: 50px; } }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
<div class="background-image"></div>
<div class="container">
    <div class="main-game-container">
        <div class="game-container">
            <div class="game-ui">
                <div class="stats">
                    <div class="stat-box"><div class="stat-value" id="score">0</div><div class="stat-label">分數</div></div>
                    <div class="stat-box" id="opponentStats" style="display: none;"><div class="stat-value" id="opponentScore">0</div><div class="stat-label" id="opponentNameLabel">對手分數</div></div>
                </div>
                <div id="unlockProgressContainer" class="unlock-progress-container">
                    <div id="songUnlockMarker" class="unlock-progress-marker song-marker"></div>
                    <div id="difficultyUnlockMarker" class="unlock-progress-marker difficulty-marker"></div>
                    <div id="unlockProgressBar" class="unlock-progress-bar"></div>
                </div>
                <div id="opponentProgressContainer" class="opponent-progress-container"><div id="opponentProgressBar" class="opponent-progress-bar"></div></div>
                <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
                <div class="controls">
                    <button class="svg-button" id="startBtn"><svg class="start-button-svg" viewBox="0 0 80 40"><defs><linearGradient id="startButtonGradient" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff8a00"/><stop offset="100%" stop-color="#e52e71"/></linearGradient></defs><rect x="0" y="0" width="80" height="40" rx="20" fill="url(#startButtonGradient)"/><path d="M30 12 L30 28 L50 20 Z" fill="white"/></svg></button>
                    <button class="settings-btn" id="settingsBtn"><svg class="settings-icon" viewBox="0 0 24 24" fill="white"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg></button>
                    <button class="music-player-btn" id="musicPlayerBtn"><svg class="music-player-icon" viewBox="0 0 24 24" fill="white"><path d="M12,3V13.55C11.41,13.21 10.73,13 10,13C7.79,13 6,14.79 6,17C6,19.21 7.79,21 10,21C12.21,21 14,19.21 14,17V7H18V3H12Z"/></svg></button>
                </div>
                <div class="music-selector">
                    <div class="music-select-wrapper"><select id="musicSelect"><option value="白影.mp3">白影</option><option value="等待.mp3">等待</option><option value="下一枝的惆悵.mp3">下一枝的惆悵</option><option value="餘燼落入虛無.mp3">餘燼落入虛無</option><option value="老屋回憶.mp3">老屋回憶</option><option value="生命之書.mp3">生命之書</option><option value="不完美的共生.mp3">不完美的共生</option><option value="不會太悲傷.mp3">不會太悲傷</option><option value="背著你說再見.mp3">背著你說再見</option><option value="開始懂了.mp3">開始懂了</option><option value="就在你身旁.mp3">就在你身旁</option><option value="阿公的海.mp3">阿公的海</option><option value="貝殼的夢囈.mp3">貝殼的夢囈</option><option value="被翻開的日記.mp3">被翻開的日記</option><option value="畫顏.mp3">畫顏</option><option value="玻璃盞.mp3">玻璃盞</option><option value="善意的謊言.mp3">善意的謊言</option></select></div>
                    <div class="difficulty-selector"><select id="difficultySelect"><option value="easy">簡單</option><option value="normal" selected>普通</option><option value="hard">困難</option><option value="hell">地獄</option></select></div>
                    <button class="personal-high-score-btn" id="personalHighScoreBtn"><svg class="personal-high-score-icon" viewBox="0 0 24 24" fill="white"><path d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"/></svg></button>
                    <button class="personal-high-score-btn" id="leaderboardBtn"><svg class="personal-high-score-icon" viewBox="0 0 24 24" fill="white"><path d="M16 11V3H8V11H2V21H22V11H16M14 5H10V9H14V5M20 13H18V15H20V13M20 17H18V19H20V17M12 13H4V19H12V13Z"/></svg></button>
                    <button class="personal-high-score-btn" id="onlineMatchBtn"><svg class="personal-high-score-icon" viewBox="0 0 24 24" fill="white"><path d="M16.5,9C15.67,9 15,8.33 15,7.5C15,6.67 15.67,6 16.5,6C17.33,6 18,6.67 18,7.5C18,8.33 17.33,9 16.5,9M7.5,9C6.67,9 6,8.33 6,7.5C6,6.67 6.67,6 7.5,6C8.33,6 9,6.67 9,7.5C9,8.33 8.33,9 7.5,9M12,16C14.67,16 17.17,14.42 18.5,12C17.17,9.58 14.67,8 12,8C9.33,8 6.83,9.58 5.5,12C6.83,14.42 9.33,16 12,16M12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20Z"/></svg></button>
                </div>
            </div>
            <div class="game-area">
                <div class="tracks" id="tracksContainer"></div>
                <div id="countdown-overlay"></div>
                <div class="vertical-lyrics-container"><p id="game-lyric-text"></p></div>
                <div class="touch-controls" id="touchControls">
                    <div class="touch-key" data-key="65">A</div><div class="touch-key" data-key="83">S</div><div class="touch-key" data-key="68">D</div><div class="touch-key" data-key="70">F</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 設定面板 (內含音符流速調節) -->
<div class="settings-modal" id="settingsModal">
    <div class="settings-content">
        <button class="close-settings" id="closeSettings">&times;</button>
        <h2 class="settings-title">遊戲設定</h2>
        <div class="setting-group"><label class="setting-label">音樂音量:</label><input type="range" class="setting-control setting-slider" id="volumeControlModal" min="0" max="1" step="0.01" value="0.7"></div>
        <div class="setting-group"><label class="setting-label">音效音量:</label><input type="range" class="setting-control setting-slider" id="sfxVolumeControl" min="0" max="1" step="0.01" value="0.5"></div>
        <div class="setting-group"><label class="setting-label">音符流速: <span id="noteSpeedValue">1.00</span>x</label><input type="range" id="noteSpeedSlider" class="setting-control setting-slider" min="0.5" max="2.0" step="0.01" value="1.0"></div>
        <div class="setting-group"><button class="setting-control" id="showDisclaimerBtn">查看音樂版權聲明</button></div>
    </div>
</div>

<!-- 其餘模態框（遊戲結束、個人分數、音樂播放器、通知、解鎖、歌詞測驗、排行榜、對戰等） -->
<div class="game-over-modal" id="gameOverModal"><div class="game-over-content"><h2 class="game-over-title" id="gameOverTitle"></h2><div class="game-over-stats"><div id="myFinalStats"><h3>您的成績</h3><div><span>最終分數:</span><span id="myFinalScore">0</span></div><div><span>最高連擊:</span><span id="myFinalCombo">0</span></div></div><div id="opponentFinalStats"><h3>對手成績</h3><div><span>最終分數:</span><span id="opponentFinalScore">0</span></div><div><span>最高連擊:</span><span id="opponentFinalCombo">0</span></div></div></div><button class="restart-btn" id="restartBtn">再玩一次</button><div id="onlineRematchControls" style="display:none;"><button class="restart-btn" id="rematchBtn">重賽</button><button class="restart-btn" id="endGameBtn">結束遊戲</button></div></div></div>
<div class="personal-high-score-modal" id="personalHighScoreModal"><div class="personal-high-score-content"><button class="close-personal-high-score" id="closePersonalHighScore">&times;</button><h2>個人最高分數</h2><ul id="personalHighScoreList"></ul></div></div>
<div class="music-player-modal" id="musicPlayerModal"><div class="music-player-content"><div class="cd-cover-container"><div class="cd-cover-wrapper"><img id="cdCoverImage" src="https://i.ibb.co/G4Rmgzjt/image.png" class="cd-cover-img"><div class="cd-cover-overlay"></div></div></div><div class="now-playing" id="nowPlaying"></div><div class="lyrics-container" id="lyricsContainer"></div><div class="player-controls"><button class="player-btn" id="loopBtn"></button><button class="player-btn" id="playbackModeBtn"></button><button class="player-btn" id="prevBtn">⏮</button><button class="player-btn play-pause-btn" id="playPauseBtn">▶</button><button class="player-btn" id="nextBtn">⏭</button></div><input type="range" class="progress-slider" id="progressSlider"><div><span id="currentTime">0:00</span>/<span id="duration">0:00</span></div><input type="range" class="setting-slider" id="volumeSliderPlayer" min="0" max="1" step="0.01" value="0.7"><ul class="playlist" id="playlist"></ul></div></div>
<div class="notification-modal" id="notificationModal"><div class="notification-content"><button class="close-notification">&times;</button><div class="notification-icon"></div><h2 class="notification-title"></h2><p class="notification-message"></p></div></div>
<div class="unlock-modal" id="unlockModal"><div class="unlock-content"><div class="unlock-icon">🔒</div><h2>未解鎖</h2><p id="unlockRequirement"></p><button class="close-unlock" id="closeUnlock">我知道了</button></div></div>
<div class="lyrics-quiz-modal" id="lyricsQuizModal"><div class="quiz-content"><h2 class="quiz-title" id="quizTitle">歌詞填充測驗</h2><p class="quiz-instructions" id="quizInstructions"></p><div class="quiz-progress" id="quizProgress"></div><div id="quizScoreDisplay"></div><div id="battleQuizTimerContainer" style="display:none;"><div id="battleQuizTimerBar"></div></div><div class="quiz-question-container"><p id="quizQuestionText"></p></div><input type="text" id="quizAnswerInput" class="quiz-answer-input"><button id="quizSubmitBtn" class="quiz-submit-btn">提交</button><button id="quizCloseBtn" class="quiz-close-btn">&times;</button></div></div>
